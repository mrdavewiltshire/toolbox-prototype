<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade Partner ToolBox: Prototype</title>
<style>
  :root{
    --purple:#4F52B2;
    --purple-hover:#444791;
    --purple-light:#EBEBFA;
    --fg1:#242424;
    --fg2:#424242;
    --fg3:#616161;
    --fg-disabled:#9E9E9E;
    --card:#F5F5F5;
    --surface:#FFFFFF;
    --stroke:#E6E6E6;
    --good:#0E700E;
    --good-bg:#F1FAF1;
    --bad:#B10E1C;
    --bad-bg:#FDF3F4;
    --page:#EDEDF2;
    --sel-border:#C9C9F0;
    --bronze:#8A5A32; --bronze-bg:#F4EAE0;
    --silver:#5B6470; --silver-bg:#EEF0F2;
    --gold:#8A6D00; --gold-bg:#FBF2D9;
    --platinum:#3E5C99; --platinum-bg:#E7ECF7;
  }
  body.dark{
    --purple:#7B7EDD;
    --purple-hover:#9193E8;
    --purple-light:#33345C;
    --fg1:#F0F0F0;
    --fg2:#D6D6D6;
    --fg3:#A0A0A0;
    --fg-disabled:#707070;
    --card:#2B2B2E;
    --surface:#1F1F22;
    --stroke:#3A3A3E;
    --good:#6CCB6C;
    --good-bg:#1E2E1E;
    --bad:#F1707B;
    --bad-bg:#3A2225;
    --page:#141416;
    --sel-border:#4B4D8F;
    --bronze:#D3934F; --bronze-bg:#3A2B1D;
    --silver:#B8C0C9; --silver-bg:#2E3236;
    --gold:#E0B84A; --gold-bg:#3A311A;
    --platinum:#8FA8E0; --platinum-bg:#232C40;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:"Segoe UI", -apple-system, "Helvetica Neue", Arial, sans-serif;
    background:var(--page); color:var(--fg1); padding:16px;
    transition:background .2s,color .2s;
  }
  .caption1{font-size:12px;line-height:16px;font-weight:400;color:var(--fg3);}
  .app{display:grid;grid-template-columns:220px 1fr;gap:14px;max-width:1360px;margin:0 auto;}

  /* Sidebar */
  .sidebar{background:var(--surface);border-radius:12px;border:1px solid var(--stroke);
    padding:18px 16px;display:flex;flex-direction:column;gap:22px;min-height:780px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-logo{width:36px;height:36px;border-radius:50%;background:var(--fg1);color:var(--surface);
    display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;}
  .brand-name{font-size:14px;line-height:18px;font-weight:600;}
  .brand-name span{display:block;font-weight:400;color:var(--fg3);font-size:12px;}
  .store-card{background:var(--card);border-radius:8px;padding:14px;}
  .store-name{font-size:16px;line-height:22px;font-weight:600;}
  .store-meta{font-size:12px;line-height:16px;color:var(--fg3);margin-top:2px;}
  .btn{margin-top:12px;width:100%;background:var(--purple);color:#fff;border:none;border-radius:6px;
    font-family:inherit;font-size:14px;line-height:20px;font-weight:600;padding:8px 12px;cursor:pointer;}
  .btn:hover{background:var(--purple-hover);}
  .btn.secondary{background:transparent;color:var(--purple);border:1px solid var(--purple);}
  .side-section{display:flex;flex-direction:column;gap:6px;}
  .side-label{font-size:12px;font-weight:600;color:var(--fg3);text-transform:uppercase;letter-spacing:.05em;}
  .side-link{display:flex;align-items:center;gap:10px;font-size:14px;line-height:20px;color:var(--fg2);
    padding:7px 8px;border-radius:6px;cursor:pointer;user-select:none;}
  .side-link:hover{background:var(--card);}
  .side-link .ico{width:18px;text-align:center;color:var(--purple);}
  .sidebar .spacer{flex:1;}
  .profile{display:flex;align-items:center;gap:10px;padding-top:14px;border-top:1px solid var(--stroke);}
  .avatar{width:32px;height:32px;border-radius:50%;background:var(--purple-light);color:var(--purple);
    display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;}
  .profile .who{font-size:12px;color:var(--fg3);}
  .profile .who b{display:block;font-size:13px;color:var(--fg1);font-weight:600;}

  /* Main */
  .main{display:flex;flex-direction:column;gap:14px;min-width:0;}
  .topbar{background:var(--surface);border-radius:12px;border:1px solid var(--stroke);
    padding:10px 18px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .nav-item{display:flex;align-items:center;gap:8px;font-size:14px;line-height:20px;color:var(--fg2);
    padding:8px 14px;border-radius:6px;cursor:pointer;user-select:none;}
  .nav-item:hover{background:var(--card);}
  .nav-item.active{color:var(--purple);font-weight:600;background:var(--purple-light);}
  .topbar .grow{flex:1;}
  .period{display:flex;align-items:center;background:var(--card);border-radius:8px;border:1px solid var(--stroke);cursor:pointer;user-select:none;}
  .period .seg{padding:7px 14px;display:flex;flex-direction:column;}
  .period .seg + .seg{border-left:1px solid var(--stroke);}
  .period .caption1{font-size:11px;line-height:14px;}
  .period .val{font-size:14px;line-height:18px;font-weight:600;}
  .period .chev{padding:0 10px;color:var(--fg3);font-size:11px;}

  .panel{background:var(--surface);border-radius:12px;border:1px solid var(--stroke);padding:20px 22px;}
  .panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .panel-title{font-size:16px;line-height:22px;font-weight:600;color:var(--purple);}
  .collapse{color:var(--purple);cursor:pointer;font-size:13px;user-select:none;}

  .kpis{display:grid;grid-template-columns:1fr 1fr 1fr 1.2fr;}
  .kpi{padding:6px 24px;border-right:1px solid var(--stroke);display:flex;align-items:center;gap:14px;}
  .kpi:first-child{padding-left:4px;}
  .kpi:last-child{border-right:none;}
  .kpi-ico{width:40px;height:40px;border-radius:50%;flex:none;background:var(--purple-light);color:var(--purple);
    display:flex;align-items:center;justify-content:center;font-size:17px;}
  .kpi-value{font-size:28px;line-height:36px;font-weight:600;font-variant-numeric:tabular-nums;}
  .kpi-delta{font-size:12px;line-height:16px;font-weight:600;margin-top:2px;display:inline-flex;align-items:center;gap:4px;padding:1px 8px;border-radius:10px;}
  .kpi-delta.pos{color:var(--good);background:var(--good-bg);}
  .kpi-delta.neg{color:var(--bad);background:var(--bad-bg);}
  .ring-wrap{display:flex;align-items:center;gap:16px;}
  .ring{position:relative;width:76px;height:76px;flex:none;}
  .ring svg{transform:rotate(-90deg);}
  .ring .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;}
  .subtitle2{font-size:16px;line-height:22px;font-weight:600;}

  .lower{display:grid;grid-template-columns:360px 1fr;}
  .col-left{border-right:1px solid var(--stroke);padding-right:20px;min-width:0;}
  .col-right{padding-left:22px;min-width:0;}
  .tabs{display:flex;gap:20px;border-bottom:1px solid var(--stroke);margin-bottom:14px;}
  .tab{font-size:14px;line-height:20px;color:var(--fg-disabled);padding:6px 2px 9px;cursor:pointer;
    border-bottom:2px solid transparent;display:flex;align-items:center;gap:7px;user-select:none;}
  .tab.active{color:var(--purple);font-weight:600;border-bottom-color:var(--purple);}

  .sp-row{display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:8px;cursor:pointer;
    border:1px solid transparent;user-select:none;}
  .sp-row:hover{background:var(--card);}
  .sp-row.selected{background:var(--purple-light);border-color:var(--sel-border);}
  .sp-row + .sp-row{margin-top:2px;}
  .sp-arrow{width:16px;text-align:center;font-size:12px;flex:none;}
  .sp-cols{display:flex;flex:1;min-width:0;}
  .sp-col{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;}
  .sp-col .caption1{font-size:11px;line-height:14px;margin-bottom:1px;white-space:nowrap;}
  .sp-col .v{font-size:14px;line-height:20px;font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sp-chev{color:var(--purple);font-size:12px;flex:none;}
  .sp-legend{margin-top:12px;padding-top:10px;border-top:1px solid var(--stroke);font-size:11px;line-height:15px;color:var(--fg-disabled);}

  .sec-title{font-size:16px;line-height:22px;font-weight:600;color:var(--purple);margin:4px 0 10px;}
  .cust-head{display:flex;align-items:baseline;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
  .cust-head .name{font-size:20px;line-height:26px;font-weight:600;}
  .cust-head .num{font-size:12px;color:var(--fg3);font-variant-numeric:tabular-nums;}
  .badge{font-size:11px;font-weight:600;padding:2px 10px;border-radius:10px;background:var(--purple-light);color:var(--purple);}
  .tier-pill{font-size:11px;font-weight:600;padding:2px 10px;border-radius:10px;display:inline-block;}
  .tier-bronze{background:var(--bronze-bg);color:var(--bronze);}
  .tier-silver{background:var(--silver-bg);color:var(--silver);}
  .tier-gold{background:var(--gold-bg);color:var(--gold);}
  .tier-platinum{background:var(--platinum-bg);color:var(--platinum);}

  .card-grid{display:grid;gap:10px;margin-bottom:18px;}
  .g3{grid-template-columns:repeat(3,1fr) auto;}
  .g4{grid-template-columns:repeat(4,1fr);}
  .g2{grid-template-columns:1fr 1fr;}
  .dcard{background:var(--card);border-radius:8px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px;}
  .dcard .ico{color:var(--purple);font-size:15px;margin-top:2px;flex:none;}
  .dcard .v{font-size:16px;line-height:22px;font-weight:600;font-variant-numeric:tabular-nums;}
  .dcard .v.big{font-size:20px;line-height:26px;}
  .trend-pill{display:flex;flex-direction:column;justify-content:center;align-items:center;border-radius:8px;padding:12px 16px;min-width:92px;}
  .trend-pill.pos{background:var(--good-bg);} .trend-pill.pos *{color:var(--good);}
  .trend-pill.neg{background:var(--bad-bg);} .trend-pill.neg *{color:var(--bad);}
  .trend-pill .caption1{font-weight:600;margin-bottom:1px;}
  .trend-pill .v{font-size:16px;line-height:22px;font-weight:600;}

  .reward-track{background:var(--card);border-radius:6px;height:8px;overflow:hidden;margin-bottom:6px;}
  .reward-fill{background:var(--purple);height:100%;border-radius:6px;transition:width .2s;}
  .mix-track{display:flex;height:8px;border-radius:6px;overflow:hidden;background:var(--card);margin:5px 0 6px;}
  .mix-seg.branch{background:var(--purple);}
  .mix-seg.collect{background:var(--gold);}
  .mix-seg.delivery{background:var(--good);}
  .upsell-card{background:var(--purple-light);border-radius:8px;padding:14px 16px;margin-bottom:18px;}
  .truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:inline-block;max-width:260px;vertical-align:bottom;}
  .upsell-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .upsell-head .ico{color:var(--purple);font-size:15px;}
  .upsell-body{font-size:14px;line-height:20px;color:var(--fg1);margin-bottom:10px;}

  .table-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;}
  th{font-size:12px;line-height:16px;font-weight:600;color:var(--fg3);text-align:left;padding:8px 10px;border-bottom:1px solid var(--stroke);white-space:nowrap;}
  td{font-size:14px;line-height:20px;padding:9px 10px;border-bottom:1px solid var(--stroke);font-variant-numeric:tabular-nums;}
  td.num,th.num{text-align:right;}
  tr:hover td{background:var(--card);}
  .status{font-size:11px;font-weight:600;padding:2px 10px;border-radius:10px;display:inline-block;}
  .status.done{background:var(--good-bg);color:var(--good);}
  .status.open{background:var(--purple-light);color:var(--purple);}
  .status.exp{background:var(--bad-bg);color:var(--bad);}
  .status.new{background:var(--card);color:var(--fg3);}
  .status.progress{background:var(--gold-bg);color:var(--gold);}
  .followup-card{background:var(--gold-bg);border-radius:8px;padding:14px 16px;margin-bottom:18px;}
  .followup-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .followup-head .ico{color:var(--gold);font-size:15px;}
  .followup-body{font-size:14px;line-height:20px;color:var(--fg1);margin-bottom:10px;}

  .stat-list{display:flex;flex-direction:column;gap:8px;}
  .stat-item{background:var(--card);border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:12px;}
  .stat-item .rank{width:26px;height:26px;border-radius:50%;background:var(--purple-light);color:var(--purple);
    font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex:none;}
  .stat-item .lab{flex:1;min-width:0;}
  .stat-item .lab .caption1{font-size:11px;line-height:14px;}
  .stat-item .lab .v{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .stat-item .amt{font-size:14px;font-weight:600;font-variant-numeric:tabular-nums;}

  .bars{display:flex;align-items:flex-end;gap:6px;height:120px;margin:6px 0 4px;}
  .bar{flex:1;background:var(--purple-light);border-radius:4px 4px 0 0;position:relative;min-width:0;}
  .bar.hot{background:var(--purple);}
  .bar span{position:absolute;bottom:-20px;left:0;right:0;text-align:center;font-size:10px;color:var(--fg3);}
  .bars-wrap{padding-bottom:24px;margin-bottom:14px;}

  .empty{padding:40px 20px;text-align:center;color:var(--fg3);font-size:14px;line-height:20px;}
  .empty .big-ico{font-size:34px;margin-bottom:10px;color:var(--purple);}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:50;}
  .overlay.show{display:flex;}
  .modal{background:var(--surface);border-radius:12px;border:1px solid var(--stroke);padding:22px;width:340px;max-width:92vw;}
  .modal h3{font-size:16px;font-weight:600;color:var(--purple);margin-bottom:14px;}
  .store-opt{padding:11px 12px;border-radius:8px;cursor:pointer;border:1px solid transparent;}
  .store-opt:hover{background:var(--card);}
  .store-opt.on{background:var(--purple-light);border-color:var(--sel-border);}
  .store-opt .n{font-size:14px;font-weight:600;}
  .store-opt .m{font-size:12px;color:var(--fg3);}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--fg1);color:var(--surface);
    font-size:13px;font-weight:600;padding:9px 18px;border-radius:8px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:60;}
  .toast.show{opacity:1;}

  @media (max-width:1080px){
    .app{grid-template-columns:1fr;}
    .sidebar{min-height:0;}
    .kpis{grid-template-columns:1fr 1fr;}
    .kpi{border-right:none;padding:12px 4px;}
    .lower{grid-template-columns:1fr;}
    .col-left{border-right:none;padding-right:0;margin-bottom:20px;}
    .col-right{padding-left:0;}
    .g3,.g4{grid-template-columns:1fr 1fr;}
    .truncate{max-width:120px;}
  }
</style>
</head>
<body>
<div class="app">

  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">TP</div>
      <div class="brand-name">Trade Partner<span>ToolBox</span></div>
    </div>
    <div class="store-card">
      <div class="caption1">Selected store</div>
      <div class="store-name" id="storeName">Winchester</div>
      <div class="store-meta" id="storeMeta">Store 4127 &middot; South Central</div>
      <button class="btn secondary" onclick="openStoreModal()">Change store</button>
    </div>
    <div class="side-section">
      <div class="side-label">Preferences</div>
      <div class="side-link" onclick="toggleTheme()"><span class="ico" id="themeIco">&#9788;</span><span id="themeLbl">Dark mode</span></div>
    </div>
    <div class="side-section">
      <div class="side-label">Support</div>
      <div class="side-link" onclick="toast('Problem report opened (prototype)')"><span class="ico">&#9993;</span>Report a problem</div>
    </div>
    <div class="spacer"></div>
    <div class="profile">
      <div class="avatar">CO</div>
      <div class="who"><b>Central Ops</b>SRV-SFXCentralOps</div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="nav-item" data-page="main" onclick="setPage('main')"><span style="color:var(--purple)">&#8962;</span>Main menu</div>
      <div class="nav-item" data-page="review" onclick="setPage('review')"><span style="color:var(--purple)">&#9998;</span>Account review</div>
      <div class="nav-item" data-page="upgrade" onclick="setPage('upgrade')"><span style="color:var(--purple)">&#10133;</span>Account upgrade</div>
      <div class="nav-item" data-page="quotes" onclick="setPage('quotes')"><span style="color:var(--purple)">&#163;</span>Quote tracker</div>
      <div class="nav-item" data-page="rewards" onclick="setPage('rewards')"><span style="color:var(--purple)">&#11088;</span>Rewards</div>
      <div class="nav-item" data-page="jobs" onclick="setPage('jobs')"><span style="color:var(--purple)">&#128736;</span>Jobs</div>
      <div class="grow"></div>
      <div class="period" onclick="cyclePeriod()" title="Click to cycle reporting week (prototype)">
        <div class="seg"><span class="caption1">Period</span><span class="val" id="periodVal">6</span></div>
        <div class="seg"><span class="caption1">Week</span><span class="val" id="weekVal">24</span></div>
        <div class="chev">&#9662;</div>
      </div>
    </div>

    <div id="pageHost"></div>
  </main>
</div>

<div class="overlay" id="storeOverlay" onclick="if(event.target===this)closeStoreModal()">
  <div class="modal">
    <h3>Select store</h3>
    <div id="storeList"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

const REWARD_TIERS = [

  {name:"Silver",   min:5000,  perk:"Free next-day delivery"},
  {name:"Gold",     min:15000, perk:"5% loyalty discount on fixings"},

  Plumber: "Plumbing",
  Electrician: "Electrical",
  Carpenter: "Power tools",

};

/* ============ HELPERS ============ */
const gbp = n => "£" + n.toLocaleString("en-GB", {minimumFractionDigits: n % 1 ? 2 : 0});
function rewardsInfo(c){
  const pts = scale(c.spend52);
  const weekly = Math.round(scale(c.spend3)/3); /* spend3 is a 3-week total; divide down to a single week's rate */
  let idx = 0;
  for(let i=0;i<REWARD_TIERS.length;i++){ if(pts>=REWARD_TIERS[i].min) idx=i; }
  const cur = REWARD_TIERS[idx];
  const next = REWARD_TIERS[idx+1];
  const pct = next ? Math.min(100, Math.round((pts-cur.min)/(next.min-cur.min)*100)) : 100;
  return {pts, weekly, cur, next, pct};
}
function recommendationFor(c){
  const cat = TRADE_CATEGORY[c.trade];
  const top = cat ? TOP_PRODUCTS.find(p=>p[1]===cat) : null;
  const brandKey = cat && CATEGORY_BRAND_KEY[cat];
  const brand = brandKey ? c.brands[brandKey] : null;
  if(top && brand) return `${top[0]} is trending this week (${top[2]} sold); their preferred ${cat.toLowerCase()} brand is ${brand}, bundle discount available`;
  if(top) return `${top[0]} is trending this week (${top[2]} sold), bundle discount available`;
  return UPSELLS[c.trade] || "Trade account bundle, ask in branch for details";
}
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove("show"),2200);
}

/* Store-dependent scaling so changing store visibly reseeds numbers */

}

function computeDailyActions(){
  const actions = [];
  const jobItems = CUSTOMERS.map((c,i)=>{
    const open = c.jobs.find(j=>j.stage!=="Complete");
    return open ? {due:new Date(open.due), i, c, job:open} : null;
  }).filter(Boolean).sort((a,b)=>a.due-b.due).slice(0,2);
  jobItems.forEach(({c,i,job})=>actions.push({
    icon:"&#128276;",
    text:`Follow up with ${c.name}: "${job.note}"`,
    btnLabel:"View job",
    onclick:`viewCustJobs(${i})`,
  }));
  const rewardsSorted = CUSTOMERS.map((c,i)=>({c,i,r:rewardsInfo(c)})).filter(x=>x.r.next)
    .sort((a,b)=>(a.r.next.min-a.r.pts)-(b.r.next.min-b.r.pts));
  if(rewardsSorted[0]){
    const {c,r} = rewardsSorted[0];
    actions.push({
      icon:"&#11088;",
      text:`${c.name} is ${(r.next.min-r.pts).toLocaleString("en-GB")} pts from ${r.next.name}, send their promotion`,
      btnLabel:"Send promotion",
      onclick:`toast('Promotion sent to ${c.name.replace(/'/g,"\\'")} (prototype)')`,
    });
  }
  const openQuotes = QUOTES.filter(q=>q[5]==="open").sort((a,b)=>new Date(a[4])-new Date(b[4]));
  if(openQuotes[0]){
    const q = openQuotes[0];
    actions.push({
      icon:"&#163;",
      text:`Quote ${q[0]} for ${q[1]} expires ${q[4]}, follow up before it lapses`,
      btnLabel:"View quotes",
      onclick:`setPage('quotes')`,
    });
  }
  const eligible = CUSTOMERS.map((c,i)=>({c,i})).filter(x=>x.c.tier!=="Gold" && x.c.trend>0);
  if(eligible[0]){
    const {c} = eligible[0];
    actions.push({
      icon:"&#10133;",
      text:`${c.name} is trending +${c.trend}%, eligible for a tier upgrade`,
      btnLabel:"Send offer",
      onclick:`toast('Upgrade pack sent to ${c.name.replace(/'/g,"\\'")} (prototype)')`,
    });
  }
  return actions;
}

function renderDailyActions(){

      <div class="followup-head"><span class="ico">&#128276;</span><span class="subtitle2">Follow up with colleague</span></div>
      <div class="followup-body">Note on "${open.title}": "${open.note}"</div>
      <button class="btn secondary" style="width:auto;padding:6px 14px;margin:0" onclick="toast('Marked as followed up: ${open.title.replace(/'/g,"\\'")} (prototype)')">Mark as actioned</button>
    </div>` : `
    <div class="followup-card">
      <div class="followup-head"><span class="ico">&#128276;</span><span class="subtitle2">Follow up with colleague</span></div>
      <div class="followup-body">No open jobs need a follow-up right now</div>
    </div>`;
  const rows = c.jobs.map(j=>`
    <div class="stat-item">
      <div class="lab"><div class="caption1">${j.due} &middot; ${gbp(j.value)}</div><div class="v">${j.title}</div></div>
      <span class="status ${STAGE_CLASS[j.stage]}">${j.stage}</span>
    </div>`).join("");
  return `
    <div class="sec-title" style="margin-top:0">Colleague follow-up</div>
    ${followup}
    <div class="sec-title">Jobs</div>
    <div class="stat-list">${rows}</div>
    <div class="sp-legend" style="border:none;margin-top:10px">${c.jobs.length} job${c.jobs.length===1?"":"s"} on file for this account &middot; notes are entered by colleagues in branch</div>`;
}

function renderReview(){
  const rows=CUSTOMERS.map(c=>`
    <tr onclick="reviewSelect('${c.name.replace(/'/g,"\\'")}')" style="cursor:pointer">
      <td style="font-weight:600">${c.name}</td><td>${c.trade}</td><td>${c.tier}</td>
      <td class="num">${gbp(scale(c.spend52))}</td><td class="num">${c.orders}</td>
      <td><span class="status ${c.trend>=0?'done':'exp'}">${c.trend>=0?"+":""}${c.trend}%</span></td>
    </tr>`).join("");
  return `<section class="panel">
    <div class="panel-head"><div class="panel-title">Account review</div>
    <span class="caption1">${CUSTOMERS.length} active trade accounts &middot; ${STORES[state.storeIdx].name}</span></div>
    <div class="table-wrap"><table>
      <thead><tr><th>Account</th><th>Trade</th><th>Tier</th><th class="num">Spend, 52 wks</th><th class="num">Orders</th><th>Trend</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
  </section>`;
}

function renderUpgrade(){
  const eligible=CUSTOMERS.filter(c=>c.tier!=="Gold" && c.trend>0);
  const rows=eligible.map(c=>`
    <div class="stat-item">
      <div class="rank">&#9650;</div>
      <div class="lab"><div class="caption1">${c.tier} &rarr; ${c.tier==="Bronze"?"Silver":"Gold"} &middot; trending +${c.trend}%</div>
      <div class="v">${c.name}</div></div>
      <button class="btn" style="margin:0;width:auto;padding:6px 14px" onclick="toast('Upgrade pack sent to ${c.name.replace(/'/g,"\\'")} (prototype)')">Send offer</button>
    </div>`).join("");
  return `<section class="panel">
    <div class="panel-head"><div class="panel-title">Account upgrade</div>
    <span class="caption1">${eligible.length} accounts eligible this week</span></div>
    <div class="sec-title" style="margin-top:0">Upgrade candidates</div>
    <div class="stat-list">${rows}</div>
    <div class="sp-legend" style="border:none">Eligibility: positive 12-week trend and below Gold tier</div>
  </section>`;
}

function renderRewardsPage(){
  const withInfo = CUSTOMERS.map(c=>({c, r:rewardsInfo(c)}))
    .sort((a,b)=>{
      const da = a.r.next ? a.r.next.min-a.r.pts : Infinity;
      const db = b.r.next ? b.r.next.min-b.r.pts : Infinity;
      return da-db;
    });
  const rows = withInfo.map(({c,r})=>`
    <tr>
      <td style="font-weight:600">${c.name}</td>
      <td>${c.trade}</td>
      <td><span class="tier-pill tier-${r.cur.name.toLowerCase()}">${r.cur.name}</span></td>
      <td class="num">${r.pts.toLocaleString("en-GB")}</td>
      <td class="num">${r.next ? r.next.min-r.pts+" to "+r.next.name : "Top tier"}</td>
      <td><span class="truncate" title="${recommendationFor(c)}">${recommendationFor(c)}</span></td>
      <td><button class="btn secondary" style="width:auto;padding:5px 12px;margin:0" onclick="toast('Promotion sent to ${c.name.replace(/'/g,"\\'")} (prototype)')">Send</button></td>
    </tr>`).join("");
  return `<section class="panel">
    <div class="panel-head"><div class="panel-title">Rewards opportunities</div>
    <span class="caption1">${CUSTOMERS.length} accounts &middot; ${STORES[state.storeIdx].name}</span></div>
    <div class="table-wrap"><table>
      <thead><tr><th>Account</th><th>Trade</th><th>Tier</th><th class="num">Points</th><th class="num">To next tier</th><th>Recommended</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
    <div class="sp-legend" style="border:none;margin-top:10px">Sorted by proximity to next Screwfix Rewards tier &middot; points based on scaled 52-week spend</div>
  </section>`;
}

function renderJobsPage(){
  const target = scale(21481.91*100)/100;
  const allJobs = CUSTOMERS.flatMap((c,i)=>c.jobs.map(j=>({...j, custIdx:i, custName:c.name, trade:c.trade})));
  const pipelineJobs = allJobs.filter(j=>j.stage!=="Complete");
  const pipelineValue = pipelineJobs.reduce((s,j)=>s+j.value,0);
  const completeValue = allJobs.filter(j=>j.stage==="Complete").reduce((s,j)=>s+j.value,0);
  const pctOfTarget = Math.round(pipelineValue/target*100);
  const sorted = allJobs.slice().sort((a,b)=>new Date(a.due)-new Date(b.due));
  const rows = sorted.map(j=>`
    <tr>
      <td style="font-weight:600">${j.custName}</td>
      <td>${j.trade}</td>
      <td>${j.title}</td>
      <td><span class="status ${STAGE_CLASS[j.stage]}">${j.stage}</span></td>
      <td class="num">${gbp(j.value)}</td>
      <td>${j.due}</td>
      <td><button class="btn secondary" style="width:auto;padding:5px 12px;margin:0" onclick="viewCustJobs(${j.custIdx})">View</button></td>
    </tr>`).join("");
  return `<section class="panel">
    <div class="panel-head"><div class="panel-title">Jobs pipeline</div>
    <span class="caption1">${allJobs.length} jobs &middot; ${STORES[state.storeIdx].name}</span></div>
    <div class="card-grid g3">
      <div class="dcard"><span class="ico">&#128736;</span><div><div class="caption1">Pipeline value</div><div class="v big">${gbp(pipelineValue)}</div></div></div>
      <div class="dcard"><span class="ico">&#9203;</span><div><div class="caption1">Open jobs</div><div class="v big">${pipelineJobs.length}</div></div></div>
      <div class="dcard"><span class="ico">&#9989;</span><div><div class="caption1">Completed value</div><div class="v big">${gbp(completeValue)}</div></div></div>
    </div>
    <div class="caption1" style="margin:-8px 0 18px">Pipeline value is ${pctOfTarget}% of this week's sales target (${gbp(target)})</div>
    <div class="table-wrap"><table>
      <thead><tr><th>Account</th><th>Trade</th><th>Job</th><th>Stage</th><th class="num">Value</th><th>Due</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
    <div class="sp-legend" style="border:none;margin-top:10px">Sorted by due date &middot; pipeline value is compared against this week's sales target</div>
  </section>`;
}

function renderQuotes(){
  const lbl={open:"Open",done:"Converted",exp:"Expired"};
  const rows=QUOTES.map(q=>`
    <tr><td style="font-weight:600">${q[0]}</td><td>${q[1]}</td><td>${q[2]}</td>
    <td class="num">${q[3]}</td><td>${q[4]}</td><td><span class="status ${q[5]}">${lbl[q[5]]}</span></td></tr>`).join("");
  const openVal = "£3,793.45";
  return `<section class="panel">
    <div class="panel-head"><div class="panel-title">Quote tracker</div>
    <span class="caption1">3 open quotes worth ${openVal}</span></div>
    <div class="table-wrap"><table>
      <thead><tr><th>Quote</th><th>Account</th><th>Description</th><th class="num">Value</th><th>Expires</th><th>Status</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
    <div class="sp-legend" style="border:none;margin-top:10px">Conversion rate this period: 62% &middot; Ave time to convert: 3.4 days</div>
  </section>`;
}

/* ============ ACTIONS ============ */
function setPage(p){ state.page=p; render(); }
function setLeftTab(t){ state.leftTab=t; render(); }
function setRightTab(t){ state.rightTab=t; render(); }
function selectCust(i){ state.custIdx=i; state.rightTab="overview"; render(); }
function viewCustJobs(i){ state.page="main"; state.custIdx=i; state.rightTab="jobs"; render(); }
function togglePerf(){ state.perfOpen=!state.perfOpen; render(); }
function cyclePeriod(){
  state.week = state.week>=26 ? 22 : state.week+1;
  document.getElementById("weekVal").textContent=state.week;
  document.getElementById("periodVal").textContent=Math.ceil(state.week/4);
  toast("Reporting week set to "+state.week);
  render();
}
function reviewSelect(name){
  const i=CUSTOMERS.findIndex(c=>c.name===name);
  if(i>-1){ state.custIdx=i; state.page="main"; state.rightTab="overview"; render(); toast("Opened "+name); }
}

function toggleTheme(){
  document.body.classList.toggle("dark");
  const dark=document.body.classList.contains("dark");
  document.getElementById("themeIco").innerHTML = dark ? "&#9789;" : "&#9788;";
  document.getElementById("themeLbl").textContent = dark ? "Light mode" : "Dark mode";
}

function openStoreModal(){
  const list=document.getElementById("storeList");
  list.innerHTML=STORES.map((s,i)=>`
    <div class="store-opt ${i===state.storeIdx?'on':''}" onclick="pickStore(${i})">
      <div class="n">${s.name}</div><div class="m">Store ${s.num} &middot; ${s.region}</div>
    </div>`).join("");
  document.getElementById("storeOverlay").classList.add("show");
}
function closeStoreModal(){ document.getElementById("storeOverlay").classList.remove("show"); }
function pickStore(i){
  state.storeIdx=i;
  const s=STORES[i];
  document.getElementById("storeName").textContent=s.name;
  document.getElementById("storeMeta").innerHTML=`Store ${s.num} &middot; ${s.region}`;
  closeStoreModal(); render();
  toast("Switched to "+s.name);
}

render();
</script>
</body>
</html>
